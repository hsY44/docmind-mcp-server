services:
  postgres:
    image: postgres:17-alpine
    container_name: docmind-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - docmind-pgdata:/var/lib/postgresql/data
volumes:
  docmind-pgdata:
